# ============================================================
# CI 워크플로우: Python (FastAPI) — app/python-app/
# 관련 유즈케이스: UC-CI-001, UC-CI-002, UC-CI-003, UC-CD-001
# ============================================================
name: CI - Python App

on:
  push:
    branches:
      - main
    paths:
      - 'app/python-app/**'
  pull_request:
    branches:
      - main
    paths:
      - 'app/python-app/**'

# contents: write — update-manifest Job의 커밋/푸시에 필요
# packages: write — GHCR 이미지 푸시에 필요
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/python-app

jobs:
  # ──────────────────────────────────────────
  # Job 1: 빌드 & 테스트 (FR-CI-002)
  # ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Python 3.11 환경 설정 (제약조건 §1)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/python-app/requirements.txt

      # 의존성 설치
      - name: Install dependencies
        working-directory: app/python-app
        run: pip install -r requirements.txt

      # 단위 테스트 실행 (pytest)
      # NFR-CI-005: 테스트 실패 시 즉시 파이프라인 종료 (fail-fast)
      - name: Run tests with pytest
        working-directory: app/python-app
        run: pytest --tb=short -v

  # ──────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & 푸시 (FR-CI-003, FR-CI-004)
  # ──────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: app/python-app
          file: app/python-app/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "### ✅ Python App Docker Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────
  # Job 3: GitOps — 매니페스트 이미지 태그 업데이트 (UC-CD-001)
  # main push 시에만 실행 (PR 제외)
  # manifests/ 변경은 app/python-app/** path 필터에 해당 없음
  # → CI 재트리거 없음 (안전)
  # ──────────────────────────────────────────
  update-manifest:
    name: Update Manifest (GitOps)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag and APP_VERSION in manifest
        id: update
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT

          MANIFEST="manifests/python-app/deployment.yaml"

          # ① 이미지 태그 업데이트 (어떤 태그든 → full SHA로 교체)
          sed -i "s|image: ghcr.io/anbyounghyun/python-app:.*|image: ghcr.io/anbyounghyun/python-app:${GITHUB_SHA}|" "$MANIFEST"

          # ② APP_VERSION 업데이트 (APP_VERSION 바로 다음 줄의 value 교체)
          awk -v sha="${SHORT_SHA}" \
          '/APP_VERSION/{found=1} found && /value:/{sub(/"[^"]*"/, "\"" sha "\""); found=0} {print}' \
          "$MANIFEST" > "${MANIFEST}.tmp" && mv "${MANIFEST}.tmp" "$MANIFEST"

          echo "✅ Manifest updated:"
          grep -E "image:|APP_VERSION" "$MANIFEST"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push manifest update
        env:
          SHORT_SHA: ${{ steps.update.outputs.SHORT_SHA }}
        run: |
          git add manifests/python-app/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit, skipping." && exit 0
          git commit -m "ci: update python-app image to ${SHORT_SHA}"
          git pull --rebase origin main
          git push

      - name: Manifest update summary
        env:
          SHORT_SHA: ${{ steps.update.outputs.SHORT_SHA }}
        run: |
          echo "### 🚀 GitOps Manifest Updated" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: python-app" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ghcr.io/anbyounghyun/python-app:${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- **APP_VERSION**: ${SHORT_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- **File**: manifests/python-app/deployment.yaml" >> $GITHUB_STEP_SUMMARY
