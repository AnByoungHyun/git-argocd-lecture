# ============================================================
# CI 워크플로우: Java (Spring Boot) — app/java-app/
# 관련 유즈케이스: UC-CI-001, UC-CI-002, UC-CI-003, UC-CD-001
# ============================================================
name: CI - Java App

on:
  push:
    branches:
      - main
    paths:
      - 'app/java-app/**'
  pull_request:
    branches:
      - main
    paths:
      - 'app/java-app/**'

# contents: write — update-manifest Job의 커밋/푸시에 필요
# packages: write — GHCR 이미지 푸시에 필요
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/java-app

jobs:
  # ──────────────────────────────────────────
  # Job 1: 빌드 & 테스트 (FR-CI-002)
  # ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Java 17 환경 설정 (제약조건 §1)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: 단위 테스트 실행
      # NFR-CI-005: 테스트 실패 시 즉시 파이프라인 종료 (fail-fast)
      - name: Run tests with Maven
        working-directory: app/java-app
        run: ./mvnw test --no-transfer-progress

  # ──────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & 푸시 (FR-CI-003, FR-CI-004)
  # UC-CI-001: main push → 이미지 푸시
  # UC-CI-002: PR → 빌드만 (push: false)
  # UC-CI-003: 테스트 실패 시 이 Job 실행 안 됨
  # ──────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Docker Buildx 설정 (레이어 캐시 활용 — NFR-CI-004)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (main push 시에만)
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 메타데이터 생성
      # NFR-TAG-001: git SHA 태그 / NFR-TAG-002: main push 시 latest 추가
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      # Docker 이미지 빌드 & 푸시
      # NFR-CI-004: cache-from/cache-to 레이어 캐시
      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: app/java-app
          file: app/java-app/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "### ✅ Java App Docker Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────
  # Job 3: GitOps — 매니페스트 이미지 태그 업데이트 (UC-CD-001)
  # main push 시에만 실행 (PR 제외)
  # manifests/ 변경은 app/java-app/** path 필터에 해당 없음
  # → CI 재트리거 없음 (안전)
  # ──────────────────────────────────────────
  update-manifest:
    name: Update Manifest (GitOps)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: 저장소 체크아웃 (GITHUB_TOKEN — contents: write 권한)
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: 이미지 태그 & APP_VERSION 업데이트
      #   ① image: ghcr.io/anbyounghyun/java-app:<현재태그> → :<full-sha>
      #   ② APP_VERSION name 바로 다음 줄 value → <short-sha 7자리>
      - name: Update image tag and APP_VERSION in manifest
        id: update
        run: |
          # SHORT_SHA: git rev-parse --short HEAD (7자리, 안전한 방식)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT

          MANIFEST="manifests/java-app/deployment.yaml"

          # ① 이미지 태그 업데이트 (어떤 태그든 → full SHA로 교체)
          sed -i "s|image: ghcr.io/anbyounghyun/java-app:.*|image: ghcr.io/anbyounghyun/java-app:${GITHUB_SHA}|" "$MANIFEST"

          # ② APP_VERSION 업데이트 (APP_VERSION 바로 다음 줄의 value 교체)
          sed -i "/APP_VERSION/{n;s|value: \".*\"|value: \"${SHORT_SHA}\";};" "$MANIFEST"

          echo "✅ Manifest updated:"
          grep -E "image:|APP_VERSION" "$MANIFEST"

      # Step 3: git 설정 (GitHub Actions bot)
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 4: 변경사항 커밋 & 푸시
      # git diff --cached --quiet: 변경 없으면 커밋 스킵 (멱등성 보장)
      # git pull --rebase: 동시 실행 충돌 방지
      - name: Commit and push manifest update
        env:
          SHORT_SHA: ${{ steps.update.outputs.SHORT_SHA }}
        run: |
          git add manifests/java-app/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit, skipping." && exit 0
          git commit -m "ci: update java-app image to ${SHORT_SHA}"
          git pull --rebase origin main
          git push

      # Step 5: 업데이트 요약
      - name: Manifest update summary
        env:
          SHORT_SHA: ${{ steps.update.outputs.SHORT_SHA }}
        run: |
          echo "### 🚀 GitOps Manifest Updated" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: java-app" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ghcr.io/anbyounghyun/java-app:${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- **APP_VERSION**: ${SHORT_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- **File**: manifests/java-app/deployment.yaml" >> $GITHUB_STEP_SUMMARY
